<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Razorpay Firebase Extension Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description"
    content="Developer-focused documentation suite for the Run Payments with Razorpay Firebase Extension. Learn about architecture, configuration, integration, and security.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Modern Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Premium Theme - Docsify Themeable -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <!-- Custom Sleek & Vibrant Styling matching Razorpay (Blue) & Firebase (Yellow/Orange) -->
  <style>
    :root {
      /* Typography */
      --base-font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --code-font-family: 'JetBrains Mono', monospace;

      /* Colors */
      --theme-color: #1363DF;
      /* Razorpay Vibrant Blue */
      --theme-color-dark: #0F3460;
      --theme-color-light: rgba(19, 99, 223, 0.1);

      --base-background-color: #ffffff;
      --base-color: #2D3748;

      /* Sidebar Custom Themeable Variables */
      --sidebar-background: rgba(247, 250, 252, 0.9);
      --sidebar-width: 300px;
      --sidebar-border-width: 1px;
      --sidebar-border-color: #E2E8F0;
      --sidebar-name-color: #1363DF;
      --sidebar-nav-link-color: #4A5568;
      --sidebar-nav-link-color--active: #1363DF;
      --sidebar-nav-link-color--hover: #1363DF;
      --sidebar-nav-strong-color: #1A202C;
      /* Light Mode Sidebar Headers */

      /* Code blocks */
      --code-background: #F8FAFC;
      /* Clean, premium slate-light background */
      --code-color: #0F172A;
      /* Slate-900 for high readability text */
      --code-inline-background: #F1F5F9;
      --code-inline-color: #0F172A;

      /* Layout & Spacing */
      --content-max-width: 55em;
      --heading-h1-color: #1A202C;
      --heading-h2-color: #2D3748;
      --heading-h3-color: #4A5568;
    }

    /* Glassmorphism sidebar */
    .sidebar {
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-right: var(--sidebar-border-width) solid var(--sidebar-border-color) !important;
      background-color: var(--sidebar-background) !important;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.02);
    }

    /* Navigation styling */
    .sidebar-nav li a {
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
      margin: 4px 15px;
      transition: all 0.2s ease;
      color: var(--sidebar-nav-link-color) !important;
      opacity: 0.8;
    }

    .sidebar-nav li a:hover {
      background: var(--theme-color-light);
      color: var(--sidebar-nav-link-color--hover) !important;
      opacity: 1;
      transform: translateX(4px);
    }

    .sidebar-nav li.active>a {
      background: var(--theme-color-light) !important;
      border-right: none !important;
      color: var(--sidebar-nav-link-color--active) !important;
      font-weight: 600;
      opacity: 1;
    }

    /* Strong Sidebar Section Headers */
    .sidebar-nav strong {
      color: var(--sidebar-nav-strong-color) !important;
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 15px 15px 5px 15px;
      margin-top: 15px;
      opacity: 0.9;
    }

    /* App name positioning */
    .sidebar .app-name {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 25px 0 10px 15px;
      color: var(--sidebar-name-color) !important;
      letter-spacing: -0.02em;
    }

    /* Markdown enhancements */
    .markdown-section {
      padding: 40px 15px !important;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .markdown-section h1 {
      font-size: 2.25rem;
      border-bottom: 1px solid var(--sidebar-border-color);
      padding-bottom: 0.3em;
    }

    /* Code highlight styling */
    .markdown-section pre {
      border-radius: 8px !important;
      border: 1px solid #E2E8F0 !important;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.06) !important;
      background-color: var(--code-background) !important;
    }

    .markdown-section code {
      font-family: var(--code-font-family) !important;
      font-size: 0.9em !important;
      color: var(--code-color) !important;
      /* Ensure plain text in code blocks is perfectly dark slate-900 */
    }

    /* Inline code pill */
    .markdown-section :not(pre)>code {
      background-color: var(--code-inline-background) !important;
      color: var(--code-inline-color) !important;
      border: 1px solid #E2E8F0 !important;
      padding: 0.2em 0.4em !important;
      border-radius: 4px !important;
      font-weight: 500 !important;
    }

    /* Premium Blockquote/Alerts styling */
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color) !important;
      background: var(--theme-color-light) !important;
      color: var(--base-color) !important;
      border-radius: 0 8px 8px 0;
      padding: 15px 20px !important;
      margin: 1.5em 0 !important;
      font-style: normal;
    }

    /* GitHub corner transition */
    .github-corner svg {
      fill: var(--theme-color);
      color: var(--base-background-color);
      transition: all 0.2s ease;
    }

    .github-corner:hover svg {
      fill: var(--theme-color-dark);
    }

    /* Floating Table of Contents / Sidebar toggler */
    .sidebar-toggle {
      background-color: transparent !important;
      padding: 20px !important;
    }

    /* Custom Search box design */
    .search {
      padding: 15px !important;
      border-bottom: 1px solid var(--sidebar-border-color);
    }

    .search input {
      border: 1px solid var(--sidebar-border-color) !important;
      border-radius: 8px !important;
      padding: 8px 12px 8px 44px !important;
      background-color: var(--base-background-color) !important;
      color: var(--base-color) !important;
      width: 100% !important;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    .search input:focus {
      border-color: var(--theme-color) !important;
      box-shadow: 0 0 0 3px var(--theme-color-light) !important;
    }

    /* Search matching results panel */
    .search .results-panel {
      color: var(--base-color) !important;
      background-color: var(--sidebar-background) !important;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--sidebar-border-color) !important;
    }

    .search .results-panel em {
      color: var(--theme-color) !important;
      font-weight: bold;
      font-style: normal;
    }

    .search .matching-post {
      border-bottom: 1px solid var(--sidebar-border-color) !important;
    }

    .search .matching-post p {
      color: var(--base-color) !important;
      opacity: 0.85;
    }

    /* Center aligning mermaid charts */
    .mermaid {
      background: white;
      padding: 1.5rem;
      border-radius: 8px;
      border: 1px solid var(--sidebar-border-color);
      margin: 1.5rem 0;
      display: flex;
      justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>

<body>
  <div id="app">Loading brilliant documentation...</div>
  <!-- Load Mermaid before Docsify so it is ready for the custom renderer -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@9.4.3/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default'
    });

    // Counter for unique SVG IDs
    let num = 0;

    window.$docsify = {
      name: 'Razorpay Extension',
      repo: 'rajivnayanc/firebase-razorpay-extension',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: '01-introduction.md',
      markdown: {
        renderer: {
          code: function (code, lang) {
            if (lang === "mermaid") {
              try {
                return (
                  '<div class="mermaid">' +
                  mermaid.render('mermaid-svg-' + num++, code) +
                  '</div>'
                );
              } catch (err) {
                console.error("Mermaid Render Error:", err);
                return '<pre class="mermaid-error">' + err.message + '</pre>';
              }
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search documentation...',
        noData: 'No results found!',
        depth: 6
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
</body>

</html>
